<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pago fraccionado — UNODEOCHO</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: white;
      border-radius: 16px;
      max-width: 520px;
      width: 100%;
      padding: 40px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .logo { font-size: 13px; font-weight: 700; letter-spacing: 2px; color: #888; text-transform: uppercase; margin-bottom: 28px; }
    .program-name { font-size: 22px; font-weight: 700; color: #111; margin-bottom: 6px; }
    .price-row { display: flex; align-items: baseline; gap: 12px; margin-bottom: 8px; }
    .price { font-size: 32px; font-weight: 800; color: #111; }
    .badge {
      background: #e8f5e9; color: #2e7d32;
      font-size: 12px; font-weight: 600;
      padding: 4px 10px; border-radius: 20px;
    }
    .cuotas-info { font-size: 14px; color: #666; margin-bottom: 28px; }
    .cuotas-info strong { color: #111; }
    hr { border: none; border-top: 1px solid #eee; margin-bottom: 28px; }
    label { display: block; font-size: 13px; font-weight: 600; color: #444; margin-bottom: 6px; }
    input {
      width: 100%; padding: 12px 14px;
      border: 1.5px solid #ddd; border-radius: 8px;
      font-size: 15px; color: #111;
      margin-bottom: 16px;
      transition: border-color 0.2s;
      outline: none;
    }
    input:focus { border-color: #111; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .hint { font-size: 11px; color: #999; margin-top: -12px; margin-bottom: 16px; }
    .btn {
      width: 100%; padding: 16px;
      background: #111; color: white;
      border: none; border-radius: 10px;
      font-size: 16px; font-weight: 700;
      cursor: pointer; margin-top: 8px;
      transition: background 0.2s;
    }
    .btn:hover { background: #333; }
    .btn:disabled { background: #ccc; cursor: not-allowed; }
    .sequra-note {
      text-align: center; font-size: 12px; color: #aaa;
      margin-top: 16px;
    }
    .sequra-note img { height: 18px; vertical-align: middle; margin-left: 4px; }
    .error-msg { color: #c62828; font-size: 13px; margin-top: -12px; margin-bottom: 16px; display: none; }
    .loading { display: none; text-align: center; padding: 16px; color: #666; font-size: 14px; }
    .not-found {
      text-align: center; padding: 40px 0;
      color: #999; font-size: 15px;
    }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">UNODEOCHO</div>
  <div id="content">
    <div class="not-found">Cargando programa...</div>
  </div>
</div>

<script>
const PROGRAMAS = {
  'metodo-alimentarte': {
    nombre: 'Método Alimentarte',
    precio: 2400,
    cuotasMax: 12,
    descripcionCuotas: 'Paga hasta en <strong>12 meses</strong> sin complicaciones'
  },
  'resetea-tu-salud': {
    nombre: 'Resetea tu Salud',
    precio: 1200,
    cuotasMax: 12,
    descripcionCuotas: 'Paga hasta en <strong>12 meses</strong> sin complicaciones'
  },
  'hipopresivos': {
    nombre: 'Curso Hipopresivos',
    precio: 222,
    cuotasMax: 4,
    descripcionCuotas: 'Paga hasta en <strong>4 cuotas</strong> cómodamente'
  },
  'recupera-calma': {
    nombre: 'Recupera tu Estado Natural de Calma',
    precio: 97,
    cuotasMax: 2,
    descripcionCuotas: 'Paga en <strong>2 cómodos plazos</strong>'
  }
};

const params = new URLSearchParams(location.search);
const slug = params.get('programa') || '';
const programa = PROGRAMAS[slug];
const content = document.getElementById('content');

if (!programa) {
  content.innerHTML = '<div class="not-found">Programa no encontrado.<br>Contacta con nosotros para obtener tu enlace personalizado.</div>';
} else {
  const cuotaAprox = (programa.precio / programa.cuotasMax).toFixed(0);
  content.innerHTML = `
    <div class="program-name">${programa.nombre}</div>
    <div class="price-row">
      <span class="price">${programa.precio.toLocaleString('es-ES')}€</span>
      <span class="badge">Pago fraccionado</span>
    </div>
    <div class="cuotas-info">
      ${programa.descripcionCuotas}
      — desde <strong>${cuotaAprox}€/mes</strong>
    </div>
    <hr/>
    <form id="payForm">
      <div class="row">
        <div>
          <label>Nombre *</label>
          <input type="text" name="firstName" required placeholder="María" />
        </div>
        <div>
          <label>Apellidos *</label>
          <input type="text" name="lastName" required placeholder="García López" />
        </div>
      </div>
      <label>Email *</label>
      <input type="email" name="email" required placeholder="maria@ejemplo.com" />
      <label>Teléfono móvil *</label>
      <input type="tel" name="phone" required placeholder="+34 612 345 678" />
      <label>DNI / NIE *</label>
      <input type="text" name="dni" required placeholder="12345678A" maxlength="9" />
      <p class="hint">Necesario para la verificación de Sequra</p>
      <label>Fecha de nacimiento *</label>
      <input type="date" name="dob" required />
      <label>Dirección *</label>
      <input type="text" name="address" required placeholder="Calle Mayor 1, 2ºA" />
      <div class="row">
        <div>
          <label>Código postal *</label>
          <input type="text" name="postalCode" required placeholder="28001" maxlength="5" />
        </div>
        <div>
          <label>Ciudad *</label>
          <input type="text" name="city" required placeholder="Madrid" />
        </div>
      </div>
      <div class="error-msg" id="errorMsg">Ha ocurrido un error. Por favor inténtalo de nuevo.</div>
      <button type="submit" class="btn" id="submitBtn">
        Continuar al pago fraccionado →
      </button>
      <div class="loading" id="loading">Conectando con Sequra...</div>
    </form>
    <p class="sequra-note">Financiación gestionada por SeQura</p>
  `;

  document.getElementById('payForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const form = e.target;
    const btn = document.getElementById('submitBtn');
    const loading = document.getElementById('loading');
    const errorMsg = document.getElementById('errorMsg');

    btn.disabled = true;
    btn.style.display = 'none';
    loading.style.display = 'block';
    errorMsg.style.display = 'none';

    const orderId = 'ORD-' + Date.now();

    const payload = {
      order: {
        id: orderId,
        total: programa.precio * 100, // en céntimos
        cuotasMax: programa.cuotasMax,
        items: [{
          id: slug,
          name: programa.nombre,
          price: programa.precio * 100,
          quantity: 1
        }]
      },
      customer: {
        firstName: form.firstName.value.trim(),
        lastName: form.lastName.value.trim(),
        email: form.email.value.trim(),
        phone: form.phone.value.trim(),
        dni: form.dni.value.trim().toUpperCase(),
        dob: form.dob.value,
        address: form.address.value.trim(),
        postalCode: form.postalCode.value.trim(),
        city: form.city.value.trim(),
        ip: '1.2.3.4',
        userAgent: navigator.userAgent
      }
    };

    try {
      const res = await fetch('/api/init', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      const data = await res.json();

      if (data.redirectUrl) {
        window.location.href = data.redirectUrl;
      } else {
        throw new Error(data.error || 'Sin URL de redirección');
      }
    } catch (err) {
      console.error(err);
      errorMsg.textContent = 'Error: ' + err.message + '. Por favor inténtalo de nuevo.';
      errorMsg.style.display = 'block';
      btn.disabled = false;
      btn.style.display = 'block';
      loading.style.display = 'none';
    }
  });
}
</script>
</body>
</html>
